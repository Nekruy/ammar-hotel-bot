# docker/docker-compose.prod.yml
version: "3.9"

services:

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "3000:3000"
    volumes:
      - ../whatsapp-session:/app/whatsapp-session
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ammar

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ammar_bot
      POSTGRES_USER:     ammar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword123}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ammar"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - ammar

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5
    networks:
      - ammar

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - bot
    networks:
      - ammar

volumes:
  pg_data:
  redis_data:

networks:
  ammar:
    driver: bridge

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AMMAR Hotel — Ammar AI Консьерж</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #C4A060;
      --gold-lt:   #D4B070;
      --gold-dim:  rgba(196,160,96,.14);
      --dark:      #0D1828;
      --card:      #111E2E;
      --surface:   #1A2535;
      --surface2:  #213040;
      --border:    #1E2E42;
      --text:      #F0E8D8;
      --muted:     #6A7E96;
      --user-bg:   #C4A060;
      --user-tx:   #1A1208;
      --bot-bg:    #1A2535;
      --bot-tx:    #F0E8D8;
      --radius:    14px;
      --green:     #3CB67A;
    }

    html, body { height: 100%; font-family: "Inter", sans-serif; background: var(--dark); color: var(--text); overflow: hidden; }

    /* ═══════════════════════════════════════════
       SETUP SCREEN
    ═══════════════════════════════════════════ */
    #setup {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #162238 0%, var(--dark) 70%);
      z-index: 10; padding: 20px;
      animation: fadeIn .4s ease;
    }

    .card {
      width: min(400px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 38px 30px 34px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(196,160,96,.06);
    }

    .logo-wrap { margin-bottom: 26px; }
    .logo {
      font-family: "Playfair Display", serif;
      font-size: 32px; font-weight: 700;
      letter-spacing: 7px; color: var(--gold); line-height: 1;
    }
    .logo-stars { font-size: 11px; color: var(--gold); letter-spacing: 3px; margin-top: 4px; }
    .logo-sub   { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 5px; }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 22px 0;
    }

    .setup-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
    .setup-hint  { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

    /* Language selector */
    .lang-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px; color: var(--muted);
      font-family: "Inter", sans-serif; font-size: 12px; font-weight: 500;
      padding: 7px 14px; cursor: pointer; transition: all .2s;
    }
    .lang-btn:hover  { border-color: var(--gold-lt); color: var(--gold-lt); }
    .lang-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    /* Room input */
    .room-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: "Inter", sans-serif; font-size: 28px; font-weight: 300;
      letter-spacing: 8px; text-align: center; padding: 16px; outline: none;
      margin-bottom: 14px; transition: border-color .25s, box-shadow .25s;
    }
    .room-input:focus        { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    .room-input.error        { border-color: #c94c4c; animation: shake .3s ease; }
    .room-input::placeholder { color: var(--border); letter-spacing: 5px; font-size: 20px; }

    /* Start button */
    .start-btn {
      width: 100%; background: linear-gradient(135deg, var(--gold), #a07838);
      color: var(--dark); border: none; border-radius: var(--radius);
      font-family: "Inter", sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: .3px; padding: 15px; cursor: pointer;
      transition: opacity .2s, transform .1s, box-shadow .2s;
    }
    .start-btn:hover  { opacity: .9; box-shadow: 0 6px 22px rgba(196,160,96,.4); }
    .start-btn:active { transform: scale(.98); }

    /* ═══════════════════════════════════════════
       CHAT SCREEN
    ═══════════════════════════════════════════ */
    #chat { display: none; flex-direction: column; height: 100dvh; animation: fadeIn .35s ease; }
    #chat.visible { display: flex; }

    /* Header */
    .hdr {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 2px 16px rgba(0,0,0,.3);
    }
    .hdr-avatar {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), #8a6020);
      display: flex; align-items: center; justify-content: center;
      font-family: "Playfair Display", serif;
      font-size: 20px; font-weight: 700; color: var(--dark);
      box-shadow: 0 2px 10px rgba(196,160,96,.35);
    }
    .hdr-info     { flex: 1; min-width: 0; }
    .hdr-name     {
      font-family: "Playfair Display", serif;
      font-size: 15px; font-weight: 600; color: var(--gold);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hdr-sub      { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .hdr-online   {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--green); flex-shrink: 0;
    }
    .online-dot   {
      width: 7px; height: 7px; background: var(--green); border-radius: 50%;
      animation: pulse 2.2s infinite;
    }
    .hdr-badge {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; padding: 4px 11px;
      font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0;
    }
    .hdr-badge b { color: var(--gold); }
    .reset-btn {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 4px 6px;
      border-radius: 8px; transition: color .2s, background .2s; flex-shrink: 0;
    }
    .reset-btn:hover { color: var(--text); background: var(--surface2); }

    /* Messages */
    .msgs {
      flex: 1; overflow-y: auto;
      padding: 18px 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .msgs::-webkit-scrollbar       { width: 3px; }
    .msgs::-webkit-scrollbar-track { background: transparent; }
    .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row { display: flex; flex-direction: column; gap: 3px; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.bot  { align-items: flex-start; }

    .msg-sender {
      font-size: 11px; font-weight: 500; color: var(--gold);
      padding: 0 4px; margin-bottom: 2px;
    }

    .bubble {
      max-width: min(78%, 520px);
      padding: 11px 14px;
      font-size: 14px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bg); color: var(--user-tx);
      border-radius: 16px 16px 4px 16px; font-weight: 500;
    }
    .msg-row.bot .bubble {
      background: var(--bot-bg); color: var(--bot-tx);
      border: 1px solid var(--border);
      border-radius: 16px 16px 16px 4px;
    }
    .msg-row.bot .bubble strong { color: var(--gold-lt); }
    .msg-row.bot .bubble code   { background: var(--surface2); border-radius: 4px; padding: 1px 5px; font-size: 13px; }

    .ts { font-size: 10px; color: var(--muted); padding: 0 4px; }

    /* Typing indicator */
    #typing-row { align-items: flex-start; display: none; }
    #typing-row.show { display: flex; }
    .typing-bub {
      background: var(--bot-bg); border: 1px solid var(--border);
      border-radius: 16px 16px 16px 4px;
      padding: 13px 16px; display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); animation: bounce 1.3s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }

    /* Input bar */
    .bar {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 10px 14px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #inp {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: "Inter", sans-serif; font-size: 14px;
      padding: 10px 14px; outline: none; resize: none;
      max-height: 120px; overflow-y: auto; line-height: 1.45;
      transition: border-color .2s, box-shadow .2s;
    }
    #inp:focus        { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    #inp::placeholder { color: var(--muted); }

    .send {
      background: linear-gradient(135deg, var(--gold), #a07838);
      border: none; border-radius: var(--radius);
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 2px 10px rgba(196,160,96,.3);
    }
    .send:hover    { opacity: .88; box-shadow: 0 4px 16px rgba(196,160,96,.5); }
    .send:active   { transform: scale(.92); }
    .send:disabled { background: var(--border); cursor: not-allowed; box-shadow: none; opacity: 1; }
    .send svg      { fill: var(--dark); }
    .send:disabled svg { fill: var(--muted); }

    /* ═══════════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════════ */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .45; } 30% { transform: translateY(-8px); opacity: 1; } }
    @keyframes shake  { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    @keyframes pulse  { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* Responsive */
    @media (max-width: 520px) {
      .hdr-online span { display: none; }
      .bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     SETUP SCREEN
══════════════════════════════════════ -->
<div id="setup">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo">AMMAR</div>
      <div class="logo-stars">★ ★ ★ ★ ★</div>
      <div class="logo-sub">Grand Hotel · Dushanbe</div>
    </div>

    <div class="divider"></div>

    <p class="setup-title" id="s-title">Добро пожаловать!</p>
    <p class="setup-hint"  id="s-hint">Выберите язык и введите номер вашей комнаты</p>

    <div class="lang-row">
      <button class="lang-btn active" data-lang="russian">RU</button>
      <button class="lang-btn"        data-lang="english">EN</button>
      <button class="lang-btn"        data-lang="tajik">ТЧ</button>
      <button class="lang-btn"        data-lang="chinese">中文</button>
    </div>

    <input id="room-inp" class="room-input" type="text"
      inputmode="numeric" maxlength="4" placeholder="412" autocomplete="off" />
    <button class="start-btn" id="start-btn">Начать чат →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     CHAT SCREEN
══════════════════════════════════════ -->
<div id="chat">
  <div class="hdr">
    <div class="hdr-avatar">A</div>
    <div class="hdr-info">
      <div class="hdr-name">Ammar AI · Консьерж</div>
      <div class="hdr-sub">AMMAR Hotel ★★★★★, Душанбе</div>
    </div>
    <div class="hdr-online">
      <div class="online-dot"></div>
      <span>Online</span>
    </div>
    <div class="hdr-badge">№&nbsp;<b id="room-badge">—</b></div>
    <button class="reset-btn" id="reset-btn" title="Сбросить сессию">↺</button>
  </div>

  <div class="msgs" id="msgs">
    <div class="msg-row" id="typing-row">
      <div class="msg-sender">Ammar AI 🏨</div>
      <div class="typing-bub">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="bar">
    <textarea id="inp" rows="1" placeholder="Напишите сообщение..."></textarea>
    <button class="send" id="send-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
"use strict";

// ─── i18n ─────────────────────────────────────────────────────────
const I18N = {

      "🏙 Рассказать о лучших местах Душанбе\n" +
      "💱 Показать курс валют (USD, RUB, EUR)\n" +
      "🕐 Оформить поздний выезд (Late Checkout)\n" +
      "🔑 Продление проживания\n" +
      "📋 Информация о вашей брони\n" +
      "⏰ Поставить звонок-побудку\n" +
      "🏔 Организовать экскурсию по Таджикистану\n" +
      "☀️ Погода в Душанбе\n\n" +
      "Просто напишите что нужно — я всё пойму сам! 😊",
    placeholder: "Напишите сообщение...",
    title:       "Добро пожаловать!",
    hint:        "Выберите язык и введите номер вашей комнаты",
    start:       "Начать чат →",

    connErr:     "⚠️ Нет соединения. Попробуйте ещё раз.",
    srvErr:      "⚠️ Ошибка сервера. Позвоните на ресепшн: 0",
    hdrName:     "Ammar AI · Консьерж",
    hdrSub:      "AMMAR Hotel ★★★★★, Душанбе",
  },
  english: {
    welcome:
      "🏨 Welcome to AMMAR Hotel!\n\n" +
      "I'm Ammar AI — your personal concierge.\n\n" +
      "I can help you with:\n" +
      "🍽 Order food & drinks to your room\n" +
      "🛎 Housekeeping (cleaning, towels, hairdryer)\n" +
      "🚕 Taxi or airport transfer\n" +
      "🏙 Best places to visit in Dushanbe\n" +
      "💱 Currency exchange rates (USD, RUB, EUR)\n" +
      "🕐 Late Checkout request\n" +
      "🔑 Room extension\n" +
      "📋 Your booking information\n" +
      "⏰ Wake-up call\n" +
      "🏔 Excursions across Tajikistan\n" +
      "☀️ Weather in Dushanbe\n\n" +
      "Just tell me what you need — I'll handle it! 😊",
    placeholder: "Type a message...",
    title:       "Welcome!",
    hint:        "Select your language and enter your room number",
    start:       "Start Chat →",
    sender:      "Ammar AI 🏨",
    connErr:     "⚠️ No connection. Please try again.",
    srvErr:      "⚠️ Server error. Please call reception: 0",
    hdrName:     "Ammar AI · Concierge",
    hdrSub:      "AMMAR Hotel ★★★★★, Dushanbe",
  },
  tajik: {
    welcome:
      "🏨 Хуш омадед ба AMMAR Hotel!\n\n" +
      "Ман Ammar AI — консьержи шахсии шумо.\n\n" +
      "Ман метавонам:\n" +
      "🍽 Хӯрок ва нӯшокӣ ба хона фармоиш диҳам\n" +
      "🛎 Хизматчиро даъват кунам (тозакунӣ, ҳавлӯ, фен)\n" +
      "🚕 Таксӣ ё трансфер ба фурудгоҳ ташкил кунам\n" +
      "🏙 Дар бораи ҷойҳои беҳтарини Душанбе нақл кунам\n" +
      "💱 Курси асъорро нишон диҳам (USD, RUB, EUR)\n" +
      "🕐 Баромади дер (Late Checkout)\n" +
      "🔑 Дароз кардани истиқомат\n" +
      "📋 Маълумот дар бораи брони шумо\n" +
      "⏰ Бедоркунӣ аз ресепшн\n" +
      "🏔 Экскурсия ба Тоҷикистон ташкил кунам\n" +
      "☀️ Обу ҳаво дар Душанбе\n\n" +
      "Танҳо бинависед чӣ лозим аст — ман худам мефаҳмам! 😊",
    placeholder: "Паём нависед...",
    title:       "Хуш омадед!",
    hint:        "Забонро интихоб кунед ва рақами хонаатонро ворид кунед",
    start:       "Чатро оғоз кунед →",
    sender:      "Ammar AI 🏨",
    connErr:     "⚠️ Пайвастагӣ нест. Лутфан дубора кӯшиш кунед.",
    srvErr:      "⚠️ Хатои сервер. Ба ресепшн занг занед: 0",
    hdrName:     "Ammar AI · Консьерж",
    hdrSub:      "AMMAR Hotel ★★★★★, Душанбе",
  },
  chinese: {
    welcome:
      "🏨 欢迎来到AMMAR Hotel！\n\n" +
      "我是Ammar AI — 您的私人礼宾。\n\n" +
      "我可以帮您：\n" +
      "🍽 订餐送到房间\n" +
      "🛎 客房服务（清洁、毛巾、吹风机）\n" +
      "🚕 出租车或机场接送\n" +
      "🏙 杜尚别最佳景点推荐\n" +
      "💱 货币汇率（美元、卢布、欧元）\n" +
      "🕐 晚退房申请\n" +
      "🔑 延长入住\n" +
      "📋 您的预订信息\n" +
      "⏰ 叫醒服务\n" +
      "🏔 塔吉克斯坦游览\n" +
      "☀️ 杜尚别天气\n\n" +
      "告诉我您需要什么 — 我会立即处理！😊",
    placeholder: "请输入消息...",
    title:       "欢迎光临！",
    hint:        "请选择语言并输入您的房间号",
    start:       "开始聊天 →",
    sender:      "Ammar AI 🏨",
    connErr:     "⚠️ 连接失败，请重试。",
    srvErr:      "⚠️ 服务器错误，请致电前台：0",
    hdrName:     "Ammar AI · 礼宾",
    hdrSub:      "AMMAR Hotel ★★★★★, 杜尚别",
  },
};

// ─── State ─────────────────────────────────────────────────────────
let sessionId  = localStorage.getItem("ammar_sid")  || null;
let roomNumber = localStorage.getItem("ammar_room") || null;
let language   = localStorage.getItem("ammar_lang") || "russian";

const t = k => (I18N[language] || I18N.russian)[k] || k;

// ─── DOM refs ──────────────────────────────────────────────────────
const setupEl    = document.getElementById("setup");
const chatEl     = document.getElementById("chat");
const roomInp    = document.getElementById("room-inp");
const startBtn   = document.getElementById("start-btn");
const sTitleEl   = document.getElementById("s-title");
const sHintEl    = document.getElementById("s-hint");
const msgsEl     = document.getElementById("msgs");
const typingRow  = document.getElementById("typing-row");
const inp        = document.getElementById("inp");
const sendBtn    = document.getElementById("send-btn");

// ─── Language ──────────────────────────────────────────────────────
function applyLang() {
  sTitleEl.textContent = t("title");
  sHintEl.textContent  = t("hint");
  startBtn.textContent = t("start");
  inp.placeholder      = t("placeholder");
  document.querySelectorAll(".lang-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === language)
  );
  document.querySelector(".hdr-name").textContent = t("hdrName");
  document.querySelector(".hdr-sub").textContent  = t("hdrSub");
}

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    language = btn.dataset.lang;
    localStorage.setItem("ammar_lang", language);
    applyLang();
  });
});

// ─── Setup ─────────────────────────────────────────────────────────
startBtn.addEventListener("click", handleStart);
roomInp.addEventListener("keydown", e => { if (e.key === "Enter") handleStart(); });

function handleStart() {
  const room = roomInp.value.trim();
  if (!/^\d{3,4}$/.test(room)) {
    roomInp.classList.add("error");
    setTimeout(() => roomInp.classList.remove("error"), 800);
    return;
  }
  roomNumber = room;
  localStorage.setItem("ammar_room", room);
  openChat(true);
}

// ─── Chat ──────────────────────────────────────────────────────────
function openChat(isNew) {
  setupEl.style.display = "none";
  chatEl.classList.add("visible");
  document.getElementById("room-badge").textContent = roomNumber;
  inp.placeholder = t("placeholder");
  applyLang();

  if (isNew) {
    sessionId = null;
    localStorage.removeItem("ammar_sid");
    clearMessages();
    addBot(t("welcome"));
  }
  inp.focus();
  sendBtn.disabled = false;
}

function clearMessages() {
  [...msgsEl.children].forEach(el => { if (el.id !== "typing-row") el.remove(); });
}

function hhmm() {
  return new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Light Markdown for bot bubbles
function mdBot(s) {
  return esc(s)
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\n/g, "<br>");
}

function addUser(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML =
    `<div class="bubble">${esc(text).replace(/\n/g,"<br>")}</div>` +
    `<div class="ts">${hhmm()}</div>`;
  msgsEl.insertBefore(row, typingRow);
  scrollBottom();
}

function addBot(text) {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.innerHTML =
    `<div class="msg-sender">${esc(t("sender"))}</div>` +
    `<div class="bubble">${mdBot(text)}</div>` +
    `<div class="ts">${hhmm()}</div>`;
  msgsEl.insertBefore(row, typingRow);
  scrollBottom();
}

function showTyping()  { typingRow.classList.add("show");    scrollBottom(); }
function hideTyping()  { typingRow.classList.remove("show"); }
function scrollBottom(){ requestAnimationFrame(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }); }

// ─── Send ──────────────────────────────────────────────────────────
inp.addEventListener("input", () => {
  inp.style.height = "auto";
  inp.style.height = Math.min(inp.scrollHeight, 120) + "px";
  sendBtn.disabled = !inp.value.trim();
});

inp.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
});
sendBtn.addEventListener("click", doSend);

async function doSend() {
  const text = inp.value.trim();
  if (!text || sendBtn.disabled) return;

  inp.value = "";
  inp.style.height = "auto";
  sendBtn.disabled = true;
  addUser(text);
  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ message: text, sessionId, roomNumber, language }),
    });

    const data = await res.json();
    hideTyping();

    if (data.sessionId) {
      sessionId = data.sessionId;
      localStorage.setItem("ammar_sid", sessionId);
    }

    if (data.error) {
      addBot(t("srvErr"));
    } else {
      addBot(data.reply || t("srvErr"));
    }
  } catch {
    hideTyping();
    addBot(t("connErr"));
  }

  sendBtn.disabled = false;
  inp.focus();
}

// ─── Reset ─────────────────────────────────────────────────────────
document.getElementById("reset-btn").addEventListener("click", () => {
  localStorage.removeItem("ammar_sid");
  localStorage.removeItem("ammar_room");
  sessionId  = null;
  roomNumber = null;
  chatEl.classList.remove("visible");
  setupEl.style.display = "flex";
  roomInp.value = "";
  applyLang();
});

// ─── Boot ──────────────────────────────────────────────────────────
applyLang();
if (roomNumber && sessionId) {
  openChat(false);
  addBot(t("welcome"));
} else if (roomNumber) {
  openChat(true);
}
</script>
</body>
</html>

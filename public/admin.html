<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMMAR Hotel — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0D1828;
  --bg2:    #111f35;
  --bg3:    #162640;
  --card:   #1A2535;
  --gold:   #C4A060;
  --gold2:  #d4b070;
  --text:   #e8e0d0;
  --muted:  #8a9ab0;
  --green:  #4caf7d;
  --red:    #e05555;
  --yellow: #f0b429;
  --border: rgba(196,160,96,.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══ LOGIN ═══════════════════════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.login-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 40px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.login-logo {
  font-size: 2.4rem; font-weight: 700;
  color: var(--gold); letter-spacing: 3px;
  margin-bottom: 4px;
}
.login-sub {
  color: var(--muted); font-size: .82rem;
  margin-bottom: 32px;
}
.login-wrap input[type=password] {
  width: 100%; padding: 13px 16px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 1rem;
  font-family: inherit; margin-bottom: 12px; outline: none;
  transition: border-color .2s;
}
.login-wrap input:focus { border-color: var(--gold); }
.login-wrap button {
  width: 100%; padding: 14px;
  background: var(--gold); color: var(--bg);
  font-weight: 700; font-size: 1rem; font-family: inherit;
  border: none; border-radius: 10px; cursor: pointer;
  transition: background .2s;
}
.login-wrap button:hover { background: var(--gold2); }
.login-err {
  color: var(--red); font-size: .83rem;
  margin-top: 12px; display: none;
}

/* ═══ ADMIN PANEL ═════════════════════════════════════════════════ */
#admin-panel {
  display: none;
  flex-direction: column;
  height: 100vh;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  height: 56px; padding: 0 20px;
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0;
}
.h-logo { font-size: 1.25rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.h-sep  { color: var(--border); }
.h-title { font-size: .82rem; color: var(--muted); }
.h-space { flex: 1; }
.h-status {
  display: flex; align-items: center; gap: 7px;
  font-size: .78rem; color: var(--muted);
}
.h-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--yellow);
  transition: background .4s;
}
.h-dot.online  { background: var(--green); }
.h-dot.offline { background: var(--red); }
.h-logout {
  background: none; border: 1px solid var(--border);
  color: var(--muted); padding: 5px 13px; border-radius: 7px;
  font-size: .78rem; font-family: inherit; cursor: pointer;
  transition: all .2s;
}
.h-logout:hover { border-color: var(--gold); color: var(--gold); }

/* Stats row */
.stats {
  display: flex; gap: 12px;
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stat {
  flex: 1; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px;
}
.stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
.stat-val   { font-size: 1.6rem; font-weight: 700; color: var(--gold); line-height: 1.15; }
.stat-sub   { font-size: .7rem; color: var(--muted); }

/* Body split */
.split {
  flex: 1; display: flex; overflow: hidden;
}

/* ═══ SIDEBAR ═════════════════════════════════════════════════════ */
.sidebar {
  width: 300px; min-width: 300px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sb-head {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
}
.sb-search {
  width: 100%; padding: 8px 12px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: .84rem;
  font-family: inherit; outline: none;
}
.sb-search:focus { border-color: var(--gold); }
.sb-count {
  font-size: .72rem; color: var(--muted);
  margin-top: 6px; padding: 0 2px;
}
.sb-list {
  flex: 1; overflow-y: auto;
}
.sb-list::-webkit-scrollbar { width: 4px; }
.sb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.guest-row {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer;
  transition: background .15s;
}
.guest-row:hover { background: rgba(196,160,96,.06); }
.guest-row.active {
  background: rgba(196,160,96,.1);
  border-left: 3px solid var(--gold);
}
.gr-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.gr-room { font-weight: 700; font-size: .88rem; color: var(--gold); }
.gr-tag {
  font-size: .65rem; color: var(--muted);
  background: rgba(255,255,255,.07);
  padding: 1px 5px; border-radius: 4px;
}
.gr-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); margin-left: auto;
}
.gr-dot.on { background: var(--green); }
.gr-msg {
  font-size: .76rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gr-time { font-size: .65rem; color: var(--muted); margin-top: 2px; }
.sb-empty {
  padding: 36px 14px; text-align: center;
  color: var(--muted); font-size: .84rem; line-height: 1.8;
}
.sb-empty-icon { font-size: 2rem; opacity: .3; margin-bottom: 8px; }

/* ═══ CHAT AREA ═══════════════════════════════════════════════════ */
.chat-area {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.chat-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 10px;
}
.chat-empty-icon { font-size: 3.5rem; opacity: .2; }
.chat-empty-txt  { font-size: .88rem; }

.chat-hd {
  padding: 11px 18px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.chat-hd-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.chat-hd-room { font-weight: 700; font-size: .98rem; }
.chat-hd-info { font-size: .74rem; color: var(--muted); }
.chat-hd-sp   { flex: 1; }
.platform-badge {
  font-size: .68rem; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
}
.platform-badge.tg  { background: rgba(34,139,230,.18); color: #6ab8f0; }
.platform-badge.web { background: rgba(196,160,96,.15); color: var(--gold); }
.platform-badge.wa  { background: rgba(76,175,61,.15);  color: #5cb85c; }

.messages {
  flex: 1; overflow-y: auto;
  padding: 14px 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; flex-direction: column; max-width: 74%; }
.msg.user      { align-self: flex-end;   align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }
.msg.system    { align-self: center;     align-items: center; max-width: 90%; }
.msg-who { font-size: .68rem; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }
.msg-bubble {
  padding: 9px 13px; border-radius: 14px;
  font-size: .86rem; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user .msg-bubble {
  background: var(--gold); color: var(--bg);
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--card); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.system .msg-bubble {
  background: rgba(196,160,96,.07);
  border: 1px dashed var(--border);
  color: var(--muted); font-size: .76rem;
  border-radius: 8px; text-align: center;
}
.msg-ts { font-size: .62rem; color: var(--muted); margin-top: 3px; padding: 0 4px; }

/* Send bar */
.send-bar {
  padding: 10px 14px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
.send-bar textarea {
  flex: 1; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: .88rem;
  padding: 9px 13px; outline: none; resize: none;
  max-height: 90px; font-family: inherit; line-height: 1.4;
  transition: border-color .2s;
}
.send-bar textarea:focus { border-color: var(--gold); }
.send-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--gold); border: none;
  color: var(--bg); font-size: 1rem;
  cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.send-btn:hover    { background: var(--gold2); }
.send-btn:disabled { background: var(--muted); cursor: default; }
.send-note {
  padding: 8px 14px;
  font-size: .74rem; color: var(--muted);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* Toast */
#toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--card); border: 1px solid var(--gold);
  color: var(--text); padding: 11px 16px; border-radius: 10px;
  font-size: .83rem; box-shadow: 0 6px 24px rgba(0,0,0,.4);
  transform: translateY(16px); opacity: 0;
  transition: all .28s; pointer-events: none; z-index: 600;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* Scrollbar global */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(196,160,96,.2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ══════════ LOGIN SCREEN ══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">AMMAR</div>
    <div class="login-sub">Grand Hotel · Панель управления</div>
    <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
    <button onclick="doLogin()">Войти</button>
    <div class="login-err" id="login-err">Неверный пароль</div>
  </div>
</div>

<!-- ══════════ ADMIN PANEL ═══════════════════════════════════════ -->
<div id="admin-panel">

  <!-- Header -->
  <div class="header">
    <span class="h-logo">AMMAR</span>
    <span class="h-sep">|</span>
    <span class="h-title">Admin Panel</span>
    <div class="h-space"></div>
    <div class="h-status">
      <div class="h-dot" id="conn-dot"></div>
      <span id="conn-label">Подключение…</span>
    </div>
    <button class="h-logout" onclick="doLogout()">Выйти</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">👥 Гостей онлайн</div>
      <div class="stat-val" id="s-online">—</div>
      <div class="stat-sub">сейчас активны</div>
    </div>
    <div class="stat">
      <div class="stat-label">💬 Сообщений</div>
      <div class="stat-val" id="s-msgs">—</div>
      <div class="stat-sub">сегодня</div>
    </div>
    <div class="stat">
      <div class="stat-label">🍽 Заказов</div>
      <div class="stat-val" id="s-orders">—</div>
      <div class="stat-sub">room service</div>
    </div>
    <div class="stat">
      <div class="stat-label">🚨 Эскалаций</div>
      <div class="stat-val" id="s-esc">—</div>
      <div class="stat-sub">к персоналу</div>
    </div>
  </div>

  <!-- Split -->
  <div class="split">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sb-head">
        <input class="sb-search" type="text" placeholder="🔍 Поиск гостя..." oninput="filterGuests(this.value)">
        <div class="sb-count" id="sb-count">Загрузка…</div>
      </div>
      <div class="sb-list" id="guest-list">
        <div class="sb-empty">
          <div class="sb-empty-icon">🏨</div>
          Нет активных гостей
        </div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-txt">Выберите гостя из списка</div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
const PASS = "ammar2026";

function doLogin() {
  const val = document.getElementById("password").value;
  const err = document.getElementById("login-err");
  if (val === PASS) {
    err.style.display = "none";
    localStorage.setItem("admin_logged_in", "true");
    showPanel();
  } else {
    err.style.display = "block";
    document.getElementById("password").value = "";
  }
}

function doLogout() {
  localStorage.removeItem("admin_logged_in");
  if (sse) { sse.close(); sse = null; }
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("admin-panel").style.display  = "none";
  document.getElementById("password").value = "";
  activeKey = null;
  allGuests = [];
}

function checkLogin() {
  if (localStorage.getItem("admin_logged_in") === "true") showPanel();
}

function showPanel() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-panel").style.display  = "flex";
  loadData();
  startSSE();
  setInterval(loadData, 5000);
}

document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

// ═══════════════════════════════════════════════════════
// API HELPER — всегда с Bearer токеном
// ═══════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: {
      "Authorization": "Bearer " + PASS,
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

// ═══════════════════════════════════════════════════════
// LOAD DATA (stats + guests)
// ═══════════════════════════════════════════════════════
let allGuests = [];
let activeKey = null;
let filterText = "";

async function loadData() {
  await Promise.all([loadStats(), loadGuests()]);
}

async function loadStats() {
  try {
    const s = await api("/api/admin/stats");
    document.getElementById("s-msgs").textContent   = s.totalMessages     ?? 0;
    document.getElementById("s-orders").textContent = s.roomServiceOrders ?? 0;
    document.getElementById("s-esc").textContent    = s.escalations       ?? 0;
    setOnline(true);
  } catch (e) {
    setOnline(false);
  }
}

async function loadGuests() {
  try {
    const data = await api("/api/admin/guests");
    allGuests = Array.isArray(data) ? data : [];
    renderGuestList(filterText);
    // Update online count
    const online = allGuests.filter(g => g.isOnline).length;
    document.getElementById("s-online").textContent = online;
  } catch (e) {
    // keep old list, just mark offline
  }
}

function filterGuests(q) {
  filterText = q.toLowerCase();
  renderGuestList(filterText);
}

function renderGuestList(q = "") {
  const list = document.getElementById("guest-list");
  const count = document.getElementById("sb-count");

  let items = allGuests;
  if (q) {
    items = allGuests.filter(g => {
      const room = (g.session?.roomNumber || "").toLowerCase();
      const msg  = (g.lastMessage || "").toLowerCase();
      const plat = (g.session?.platform || "").toLowerCase();
      return room.includes(q) || msg.includes(q) || plat.includes(q);
    });
  }

  // Sort: online first, then by lastTime desc
  items = [...items].sort((a, b) => {
    if (a.isOnline !== b.isOnline) return a.isOnline ? -1 : 1;
    return (b.lastTime || "") > (a.lastTime || "") ? 1 : -1;
  });

  count.textContent = items.length + " " + plural(items.length, "гость", "гостя", "гостей");

  if (!items.length) {
    list.innerHTML = `<div class="sb-empty">
      <div class="sb-empty-icon">🏨</div>
      ${q ? "Ничего не найдено" : "Нет активных гостей.<br>Напишите боту в Telegram."}
    </div>`;
    return;
  }

  list.innerHTML = items.map(g => {
    const platform  = g.session?.platform || "telegram";
    const platLabel = { telegram:"TG", web:"WEB", whatsapp:"WA" }[platform] || "?";
    const platClass = { telegram:"tg", web:"web", whatsapp:"wa" }[platform] || "tg";
    const room      = g.session?.roomNumber || "?";
    const lang      = (g.session?.language || "ru").slice(0, 2).toUpperCase();
    const isActive  = activeKey === g.key;
    return `<div class="guest-row${isActive ? " active" : ""}" onclick="selectGuest('${esc(g.key)}')">
      <div class="gr-top">
        <span class="gr-room">Ком. ${room}</span>
        <span class="gr-tag platform-badge ${platClass}">${platLabel}</span>
        <span class="gr-tag">${lang}</span>
        <span class="gr-dot${g.isOnline ? " on" : ""}"></span>
      </div>
      <div class="gr-msg">${esc(g.lastMessage || "—")}</div>
      <div class="gr-time">${fmtTime(g.lastTime)}</div>
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════════════════════
// SELECT GUEST & LOAD HISTORY
// ═══════════════════════════════════════════════════════
async function selectGuest(key) {
  activeKey = key;
  renderGuestList(filterText); // update active highlight

  const g = allGuests.find(x => x.key === key);
  const platform = g?.session?.platform || "telegram";
  const platLabel = { telegram:"TG", web:"WEB", whatsapp:"WA" }[platform] || "?";
  const platClass = { telegram:"tg", web:"web", whatsapp:"wa" }[platform] || "tg";
  const room      = g?.session?.roomNumber || "?";
  const name      = g?.session?.guestName  || "Гость";
  const lang      = g?.session?.language   || "ru";
  const msgs      = g?.msgCount || 0;
  const canSend   = platform === "telegram";

  const area = document.getElementById("chat-area");
  area.innerHTML = `
    <div class="chat-hd">
      <div class="chat-hd-av">🛎</div>
      <div>
        <div class="chat-hd-room">Комната ${room}</div>
        <div class="chat-hd-info">${esc(name)} · ${lang} · ${msgs} сообщений</div>
      </div>
      <div class="chat-hd-sp"></div>
      <span class="platform-badge ${platClass}">${platLabel}</span>
    </div>
    <div class="messages" id="msg-area"><div style="color:var(--muted);font-size:.8rem;text-align:center;padding:20px">Загрузка…</div></div>
    ${canSend
      ? `<div class="send-bar">
           <textarea id="send-input" rows="1" placeholder="Написать гостю от менеджера…" onkeydown="sendKey(event)"></textarea>
           <button class="send-btn" onclick="sendMsg()" id="send-btn">➤</button>
         </div>`
      : `<div class="send-note">Отправка только для Telegram-гостей</div>`
    }
  `;

  // Load history
  try {
    const history = await api("/api/admin/history/" + encodeURIComponent(key));
    const msgArea = document.getElementById("msg-area");
    if (!msgArea) return;
    if (!Array.isArray(history) || !history.length) {
      msgArea.innerHTML = '<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:20px">История пуста</div>';
      return;
    }
    msgArea.innerHTML = history.map(renderMsg).join("");
    msgArea.scrollTop = msgArea.scrollHeight;
  } catch (e) {
    const m = document.getElementById("msg-area");
    if (m) m.innerHTML = '<div style="color:var(--red);font-size:.8rem;text-align:center;padding:20px">Ошибка загрузки истории</div>';
  }
}

function renderMsg(m) {
  const cls    = m.role === "user" ? "user" : "assistant";
  const who    = m.role === "user" ? "👤 Гость" : "🤖 Ammar AI";
  const bubble = esc(m.content || "");
  const time   = fmtTime(m.time);
  return `<div class="msg ${cls}">
    <div class="msg-who">${who}</div>
    <div class="msg-bubble">${bubble}</div>
    ${time ? `<div class="msg-ts">${time}</div>` : ""}
  </div>`;
}

function appendMsg(role, content) {
  const area = document.getElementById("msg-area");
  if (!area) return;
  const div = document.createElement("div");
  div.innerHTML = renderMsg({ role, content, time: new Date().toISOString() });
  area.appendChild(div.firstElementChild);
  area.scrollTop = area.scrollHeight;
}

// ═══════════════════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════════════════
function sendKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

async function sendMsg() {
  const inp = document.getElementById("send-input");
  const btn = document.getElementById("send-btn");
  const txt = inp?.value?.trim();
  if (!txt || !activeKey) return;

  inp.value = "";
  if (btn) btn.disabled = true;

  try {
    await api("/api/admin/send/" + encodeURIComponent(activeKey), {
      method: "POST",
      body:   JSON.stringify({ message: txt }),
    });
    appendMsg("assistant", "👔 [Менеджер]: " + txt);
    toast("✅ Сообщение отправлено");
  } catch (e) {
    toast("❌ Ошибка: " + e.message);
  } finally {
    if (btn) btn.disabled = false;
    if (inp) inp.focus();
  }
}

// ═══════════════════════════════════════════════════════
// SSE — реальное время
// ═══════════════════════════════════════════════════════
let sse = null;

function startSSE() {
  if (sse) sse.close();
  sse = new EventSource("/api/admin/events?token=" + encodeURIComponent(PASS));

  sse.addEventListener("message", e => {
    try {
      const data = JSON.parse(e.data);
      // Refresh guest list
      loadGuests();
      loadStats();
      // If current guest → append new messages live
      if (data.sessionKey === activeKey) {
        if (data.userMessage) appendMsg("user",      data.userMessage);
        if (data.botReply)    appendMsg("assistant", data.botReply);
      }
      // Alert on escalation
      const combined = (data.userMessage || "") + (data.botReply || "");
      if (/эскалаци|escalat|жалоб|complaint/i.test(combined)) {
        toast("🚨 Эскалация! Ком. " + (data.room || "?"), 6000);
        beep();
      }
    } catch {}
  });

  sse.onopen  = () => setOnline(true);
  sse.onerror = () => {
    setOnline(false);
    setTimeout(startSSE, 5000);
  };
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function setOnline(on) {
  const dot   = document.getElementById("conn-dot");
  const label = document.getElementById("conn-label");
  if (!dot || !label) return;
  dot.className   = "h-dot " + (on ? "online" : "offline");
  label.textContent = on ? "Online" : "Переподключение…";
}

let toastT = null;
function toast(msg, dur = 3000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove("show"), dur);
}

function beep() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch {}
}

function fmtTime(iso) {
  if (!iso) return "";
  try {
    const d   = new Date(iso);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }
    return d.toLocaleDateString("ru-RU", { day:"2-digit", month:"2-digit" })
         + " " + d.toLocaleTimeString("ru-RU", { hour:"2-digit", minute:"2-digit" });
  } catch { return ""; }
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return n + " " + one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return n + " " + few;
  return n + " " + many;
}
